services:
  neo4j:
    image: neo4j:5.26-community
    container_name: marinara-graphiti-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_uuid_enabled: "true"
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INITIAL_SIZE:-512M}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX_SIZE:-1G}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE_SIZE:-512M}"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p \"$${NEO4J_AUTH#neo4j/}\" \"RETURN 1;\" >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  graphiti-api:
    build:
      context: ./graphiti-api
      dockerfile: Dockerfile
    container_name: marinara-graphiti-api
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "${GRAPHITI_API_PORT:-8765}:8000"
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      DEEPSEEK_MODEL: "${DEEPSEEK_MODEL:-deepseek-chat}"
      DEEPSEEK_SMALL_MODEL: "${DEEPSEEK_SMALL_MODEL:-${DEEPSEEK_MODEL}}"
      OPENAI_API_KEY: "${DEEPSEEK_API_KEY}"
      OPENAI_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      MARINARA_HOST: "${MARINARA_HOST:-http://host.docker.internal:3004}"
      MARINARA_EMBEDDING_PATH: "${MARINARA_EMBEDDING_PATH:-/api/sidecar/v1/embeddings}"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-openai_compatible}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-${DEEPSEEK_API_KEY}}"
      EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-https://openrouter.ai/api/v1}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-qwen/qwen3-embedding-8b}"
      EMBEDDING_DIMENSION: "${EMBEDDING_DIMENSION:-4096}"
      EMBEDDING_TIMEOUT_SECONDS: "${EMBEDDING_TIMEOUT_SECONDS:-10}"
      EMBEDDING_DIM: "${EMBEDDING_DIMENSION:-4096}"
      ALLOW_DUMMY_EMBEDDINGS: "${ALLOW_DUMMY_EMBEDDINGS:-true}"
      REQUEST_TIMEOUT_SECONDS: "${REQUEST_TIMEOUT_SECONDS:-15}"
      RETRY_ATTEMPTS: "${RETRY_ATTEMPTS:-3}"
      RETRY_BACKOFF_SECONDS: "${RETRY_BACKOFF_SECONDS:-2}"
      SEMAPHORE_LIMIT: "${SEMAPHORE_LIMIT:-10}"
      GRAPHITI_TELEMETRY_ENABLED: "${GRAPHITI_TELEMETRY_ENABLED:-false}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).status)\"",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
